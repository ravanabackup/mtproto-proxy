name: MTProto Monitor

on:
  workflow_dispatch:

  schedule:
    - cron: "0 */2 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_BOT_OWNER_ID: ${{ secrets.TELEGRAM_BOT_OWNER_ID }}
        run: python main.py --auto --overwrite
      
      - name: Commit
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add README.md data/valid_proxy.txt data/valid_proxy.json data/raw_proxy.txt public/index.html
          git commit -m "🔄 Automatic update" || exit 0
          
          git push
      
      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'public/'
      
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4