name: MTProto Monitor

on:
  workflow_dispatch:

  schedule:
    - cron: "0 */2 * * *"

  push:
    branches:
      - main
    paths:
      - 'data/raw_proxy.txt'

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      
      - name: Run
        run: python main.py
      
      - name: Commit
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add README.md data/valid_proxy.txt data/valid_proxy.json
          git commit -m "🔄 Automatic update" || exit 0
          
          git push